name: Lint and Test

on:
  workflow_call:
    inputs:
      run_tests:
        description: "Executar testes automatizados"
        required: false
        type: boolean
        default: true
      run_lint:
        description: "Executar lint/checkstyle"
        required: false
        type: boolean
        default: true

jobs:
  lint_and_test:
    name: Docker Compose Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health; then
              echo "API pronta."
              exit 0
            fi
            echo "Aguardando API subir..."
            sleep 5
          done
          echo "API não ficou pronta a tempo."
          docker compose logs
          exit 1

      - name: Run lint
        if: ${{ inputs.run_lint }}
        working-directory: DEVOPS2026-ricknmorty-api
        run: mvn -B checkstyle:checkstyle

      - name: Run tests
        if: ${{ inputs.run_tests }}
        working-directory: DEVOPS2026-ricknmorty-api
        run: mvn -B test

      - name: Show container status
        if: always()
        run: docker compose ps

      - name: Show container logs
        if: always()
        run: docker compose logs --no-color

      - name: Stop containers
        if: always()
        run: docker compose down -v