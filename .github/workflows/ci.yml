name: CI

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      run_tests:
        description: "Executar testes?"
        required: true
        type: boolean
        default: true
      run_lint:
        description: "Executar lint?"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  lint_and_test:
    name: Reusable Docker Compose Validation
    uses: ./.github/workflows/lint-and-test.yml
    with:
      run_tests: ${{ inputs.run_tests != false }}
      run_lint: ${{ inputs.run_lint != false }}

  security_spotbugs:
    name: Security Analysis (SpotBugs)
    runs-on: ubuntu-latest
    needs: lint_and_test

    defaults:
      run:
        working-directory: DEVOPS2026-ricknmorty-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Generate SpotBugs report
        run: mvn -B spotbugs:spotbugs

      - name: Publish SpotBugs report
        if: always()
        uses: jwgmeligmeyling/spotbugs-github-action@master
        with:
          path: '**/spotbugsXml.xml'