name: Variables and Secrets Demo

on:
  workflow_dispatch:

jobs:
  vars_and_secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Show repository variables
        run: |
          echo "Modo da aplicação: ${{ vars.APP_MODE }}"
          echo "Email de suporte: ${{ vars.SUPPORT_EMAIL }}"

      - name: Use variables to control pipeline behavior
        run: |
          if [ "${{ vars.APP_MODE }}" = "production" ]; then
            echo "Executando pipeline em modo de produção"
          else
            echo "Executando pipeline em modo diferente de produção"
          fi

      - name: Simulate protected authentication step
        env:
          PROD_TOKEN: ${{ secrets.PROD_TOKEN }}
        run: |
          if [ -z "$PROD_TOKEN" ]; then
            echo "Token não configurado"
            exit 1
          fi
          echo "Autenticação simulada com sucesso usando secret protegido"